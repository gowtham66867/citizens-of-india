steps:
  # Build and push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/citizens-india-backend:$COMMIT_SHA
      - ./backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/citizens-india-backend:$COMMIT_SHA']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - citizens-india-backend
      - --image=gcr.io/$PROJECT_ID/citizens-india-backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest

  # Build frontend
  - name: 'node:20'
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend && npm ci && REACT_APP_API_URL=$_BACKEND_URL npm run build

  # Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $PROJECT_ID --token $$FIREBASE_TOKEN
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-deploy-token/versions/latest
      env: FIREBASE_TOKEN

substitutions:
  _BACKEND_URL: 'https://citizens-india-backend-xyz-el.a.run.app'

options:
  logging: CLOUD_LOGGING_ONLY
