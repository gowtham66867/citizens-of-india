version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8090:8080"
    env_file:
      - ./backend/.env
    environment:
      - SQLITE_DB_PATH=/data/submissions.db
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - BROWSER=none
      - REACT_APP_API_URL=http://localhost:8090
    command: sh -c "npm install && npm start"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
